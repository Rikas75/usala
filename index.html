function ChatApp({user,onLogout}){const br=DB.brand();const[tab,setTab]=useState("chat");const[view,setView]=useState("app");const[msgs,setMsgs]=useState([{role:"ai",text:`Hola, ${user.name.split(" ")[0]} 👋\n\nElige un algoritmo o describe lo que necesitas.`}]);const[input,setInput]=useState("");const[loading,setL]=useState(false);const[code,setCode]=useState("");const[expl,setExpl]=useState("");const[history,setHistory]=useState([]);const[copied,setCopied]=useState(false);const[badge,setBadge]=useState({code:false,expl:false});const[menu,setMenu]=useState(false);const endRef=useRef(null);const dl=getDaysLeft(user);const pb=user.role==="admin"?{label:"⚙ Admin",color:br.accent}:user.plan==="lifetime"?{label:"♾ Vitalicio",color:"#A5D6A7"}:user.plan==="monthly"?{label:`📅 ${Math.max(0,dl)}d`,color:dl<=5?"#ff3d6e":br.accent}:{label:`⏱ ${Math.max(0,dl)}d`,color:dl<=3?"#ff3d6e":"#FFCC02"};

if(view==="apikey")return <ApiKeySetup onSave={()=>setView("app")}/>;
async function send(text){if(!text?.trim()||loading)return;const key=DB.apiKey();if(!key){setMsgs(p=>[...p,{role:"ai",text:"⚠ Sin API key. Ve al menú → 🔑 Configurar API Key"}]);return;}setMsgs(p=>[...p,{role:"user",text}]);setInput("");setL(true);const nh=[...history,{role:"user",content:text}];setHistory(nh);try{const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2500,system:AI_SYS,messages:nh})});const data=await res.json();if(data.error)throw new Error(data.error.message);const full=data.content.map(b=>b.text||"").join("");setHistory(p=>[...p,{role:"assistant",content:full}]);const cm=full.match(/---CODE---([\s\S]*?)---EXPLANATION---/);const em=full.match(/---EXPLANATION---([\s\S]*?)---END---/);if(cm){setCode(cm[1].trim());setBadge(p=>({...p,code:true}));}if(em){setExpl(em[1].trim());setBadge(p=>({...p,expl:true}));}setMsgs(p=>[...p,{role:"ai",text:cm?"✓ Código generado. Toca { } para verlo.":full}]);}catch(e){setMsgs(p=>[...p,{role:"ai",text:"⚠ Error: "+e.message}]);}setL(false);}
function hi(c){return c.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/(#[^\n]*)/g,'<span style="color:#6272a4;font-style:italic">$1</span>').replace(/\b(def|class|import|from|return|if|else|elif|for|while|in|not|and|or|True|False|None|lambda|try|except|with|as|pass|break|continue|self|yield)\b/g,'<span style="color:#ff79c6">$1</span>').replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g,'<span style="color:#f1fa8c">$1</span>').replace(/\b(\d+\.?\d*)\b/g,'<span style="color:#bd93f9">$1</span>').replace(/\b([a-zA-Z_]\w*)\s*(?=\()/g,'<span style="color:#50fa7b">$1</span>');}
const tb=(t,l,b)=><button onClick={()=>{setTab(t);setBadge(p=>({...p,[t==="code"?"code":"expl"]:false}));}} style={{flex:1,padding:"13px 4px",border:"none",background:"none",borderBottom:`2px solid ${tab===t?br.accent:"transparent"}`,color:tab===t?br.accent:G.dim,fontFamily:G.font,fontSize:"0.75rem",fontWeight:tab===t?700:400,cursor:"pointer",position:"relative"}}>{l}{b&&<span style={{position:"absolute",top:8,right:"calc(50% - 20px)",width:7,height:7,borderRadius:"50%",background:br.accent}}/>}</button>;
