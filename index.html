const getDaysLeft=(user)=>{if(!user||user.role==="admin")return Infinity;if(user.plan==="lifetime")return Infinity;if(user.plan==="monthly"&&user.planMonths&&user.approvedAt){const totalDays=user.planMonths*30;const elapsed=Math.floor((Date.now()-new Date(user.approvedAt))/86400000);return totalDays-elapsed;}if(!user.approvedAt)return 0;return TRIAL_DAYS-Math.floor((Date.now()-new Date(user.approvedAt))/86400000);};

const G={bg:"#050812",glass:"rgba(255,255,255,0.04)",glassBorder:"rgba(255,255,255,0.08)",text:"#E8EEFF",dim:"rgba(232,238,255,0.35)",font:"'Outfit', sans-serif",mono:"'JetBrains Mono', monospace"};
function GlassCard({children,style,onClick}){return <div onClick={onClick} style={{background:G.glass,border:`1px solid ${G.glassBorder}`,borderRadius:20,backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",...style}}>{children}</div>;}
function NeonButton({children,onClick,color="#4FC3F7",full=false,ghost=false,small=false,style={}}){const[pressed,setPressed]=useState(false);return <button onPointerDown={()=>setPressed(true)} onPointerUp={()=>setPressed(false)} onPointerLeave={()=>setPressed(false)} onClick={onClick} style={{width:full?"100%":"auto",padding:small?"8px 16px":"14px 24px",border:ghost?`1px solid ${color}55`:"none",borderRadius:14,background:ghost?`${color}10`:`linear-gradient(135deg,${color}dd,${color}88)`,color:ghost?color:"#050812",fontFamily:G.font,fontWeight:700,fontSize:small?"0.78rem":"0.9rem",cursor:"pointer",transform:pressed?"scale(0.97)":"scale(1)",transition:"all 0.15s",boxShadow:ghost?"none":`0 0 24px ${color}44`,...style}}>{children}</button>;}
function Input({placeholder,value,onChange,type="text",onEnter,icon}){const[focused,setFocused]=useState(false);const brand=DB.brand();return <div style={{position:"relative",marginBottom:12}}>{icon&&<div style={{position:"absolute",left:16,top:"50%",transform:"translateY(-50%)",color:focused?brand.accent:G.dim,fontSize:"1rem",pointerEvents:"none"}}>{icon}</div>}<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)} onKeyDown={e=>e.key==="Enter"&&onEnter?.()} style={{width:"100%",padding:icon?"14px 16px 14px 44px":"14px 18px",background:focused?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.03)",border:`1px solid ${focused?brand.accent+"66":G.glassBorder}`,borderRadius:14,fontFamily:G.font,fontSize:"0.9rem",color:G.text,outline:"none",transition:"all 0.2s",boxSizing:"border-box"}} /></div>;}

function ApiKeySetup({onSave}){const brand=DB.brand();const[key,setKey]=useState("");const[err,setErr]=useState("");const[loading,setLoading]=useState(false);async function test(){if(!key.startsWith("sk-ant-")){setErr("La key debe empezar con sk-ant-");return;}setLoading(true);setErr("");try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:10,messages:[{role:"user",content:"hi"}]})});const d=await r.json();if(d.error){setErr("Key inválida: "+d.error.message);setLoading(false);return;}DB.saveApiKey(key);onSave(key);}catch(e){setErr("Error: "+e.message);}setLoading(false);}
return(<div style={{minHeight:"100vh",background:G.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px",fontFamily:G.font,position:"relative",overflow:"hidden"}}><AmbientBg accent={brand.accent} accent2={brand.accent2}/><div style={{position:"relative",zIndex:1,width:"100%",maxWidth:400}}><div style={{textAlign:"center",marginBottom:32}}><div style={{fontSize:"3rem",marginBottom:16}}>🔑</div><div style={{fontWeight:900,fontSize:"1.6rem",color:G.text,marginBottom:8}}>Configurar API Key</div><div style={{fontSize:"0.82rem",color:G.dim,lineHeight:1.7}}>Para activar la IA necesitas una API key de Anthropic.<br/>Ve a <span style={{color:brand.accent}}>console.anthropic.com</span> → API Keys → Crear clave</div></div><GlassCard style={{padding:24}}><input value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-api03-..." style={{width:"100%",padding:"14px 16px",background:"rgba(255,255,255,0.03)",border:`1px solid ${G.glassBorder}`,borderRadius:14,fontFamily:G.mono,fontSize:"0.78rem",color:brand.accent,outline:"none",marginBottom:12,boxSizing:"border-box"}}/>{err&&<div style={{padding:"10px 14px",background:"#ff3d6e14",border:"1px solid #ff3d6e44",borderRadius:10,marginBottom:12,fontSize:"0.78rem",color:"#ff3d6e"}}>⚠ {err}</div>}<NeonButton onClick={test} full color={brand.accent} style={{opacity:loading?0.7:1}}>{loading?"Verificando...":"✓ Guardar y activar"}</NeonButton></GlassCard></div></div>);}
function LoginScreen({onAuth}){const brand=DB.brand();const[mode,setMode]=useState("login");const[name,setName]=useState("");const[email,setEmail]=useState("");const[pass,setPass]=useState("");const[err,setErr]=useState("");const[ok,setOk]=useState("");const[loading,setLoading]=useState(false);async function submit(){setErr("");setOk("");setLoading(true);await new Promise(r=>setTimeout(r,600));const users=DB.users();if(mode==="register"){if(!name||!email||!pass){setErr("Completa todos los campos");setLoading(false);return;}if(pass.length<6){setErr("Contraseña mínimo 6 caracteres");setLoading(false);return;}if(users[email]){setErr("Este email ya existe");setLoading(false);return;}const isAdmin=ADMIN_EMAILS.includes(email.toLowerCase());users[email]={name,email,pass,role:isAdmin?"admin":"user",status:isAdmin?"approved":"pending",plan:isAdmin?"lifetime":"trial",planMonths:null,registeredAt:new Date().toISOString(),approvedAt:isAdmin?new Date().toISOString():null};DB.saveUsers(users);setOk("✓ Cuenta creada exitosamente");setTimeout(()=>{setMode("login");setOk("");},1800);}else{const u=users[email.toLowerCase()]||users[email];if(!u){setErr("Email no encontrado");setLoading(false);return;}if(u.pass!==pass){setErr("Contraseña incorrecta");setLoading(false);return;}if(u.status==="pending"){setErr("Cuenta pendiente de aprobación");setLoading(false);return;}if(u.status==="rejected"){setErr("Acceso rechazado");setLoading(false);return;}if(u.role!=="admin"&&!isAccessActive(u)){setErr("Tu período de acceso ha vencido.");setLoading(false);return;}DB.saveSession(u);onAuth(u);}setLoading(false);}

`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{brand.name}</div><div style={{width:50,height:2,background:`linear-gradient(90deg,${brand.accent},${brand.accent2})`,borderRadius:2,margin:"10px auto 8px"}}/><div style={{fontSize:"0.62rem",color:G.dim,letterSpacing:"0.42em",textTransform:"uppercase"}}>{brand.sub}</div></div>
<GlassCard style={{padding:28}}><div style={{display:"flex",background:"rgba(255,255,255,0.04)",borderRadius:12,padding:4,marginBottom:24}}>{["login","register"].map(m=><button key={m} onClick={()=>{setMode(m);setErr("");setOk("");}} style={{flex:1,padding:"10px",border:mode===m?`1px solid ${brand.accent}44`:"1px solid transparent",borderRadius:10,background:mode===m?`${brand.accent}22`:"transparent",color:mode===m?brand.accent:G.dim,fontFamily:G.font,fontSize:"0.85rem",fontWeight:mode===m?700:400,cursor:"pointer"}}>{m==="login"?"Iniciar sesión":"Registrarse"}</button>)}</div>{mode==="register"&&<Input icon="✦" placeholder="Tu nombre completo" value={name} onChange={setName}/>}<Input icon="@" placeholder="correo@ejemplo.com" value={email} onChange={setEmail} type="email"/><Input icon="◈" placeholder="Contraseña" value={pass} onChange={setPass} type="password" onEnter={submit}/>{err&&<div style={{padding:"12px 16px",background:"#ff3d6e14",border:"1px solid #ff3d6e44",borderRadius:12,marginBottom:16,fontSize:"0.82rem",color:"#ff3d6e"}}>⚠ {err}</div>}{ok&&<div style={{padding:"12px 16px",background:`${brand.accent}14`,border:`1px solid ${brand.accent}44`,borderRadius:12,marginBottom:16,fontSize:"0.82rem",color:brand.accent}}>{ok}</div>}<NeonButton onClick={submit} full color={brand.accent} style={{opacity:loading?0.7:1}}>{loading?"···":mode==="login"?"Entrar →":"Crear cuenta →"}</NeonButton>{mode==="register"&&<div style={{marginTop:16,padding:"12px 16px",background:`${brand.accent2}10`,border:`1px solid ${brand.accent2}28`,borderRadius:12,fontSize:"0.75rem",color:brand.accent2}}>ℹ Tendrás <strong>{TRIAL_DAYS} días</strong> de prueba al ser aprobado.</div>}</GlassCard></div></div>);}
function AdminUsers({onBack}){const brand=DB.brand();const[users,setUsers]=useState(DB.users());const[filter,setFilter]=useState("pending");const[toast,setToast]=useState("");const[planModal,setPlanModal]=useState(null);const[selectedPlan,setSelectedPlan]=useState("trial");const[selectedMonths,setSelectedMonths]=useState(1);function toast_(msg){setToast(msg);setTimeout(()=>setToast(""),3000);}function reject(email){const u=DB.users();u[email].status="rejected";DB.saveUsers(u);setUsers({...u});toast_(`✗ ${u[email].name} rechazado`);}function approveWithPlan(email,plan,months=null){const u=DB.users();u[email].status="approved";u[email].plan=plan;u[email].planMonths=plan==="monthly"?months:null;u[email].approvedAt=new Date().toISOString();DB.saveUsers(u);setUsers({...u});setPlanModal(null);toast_(`✓ ${u[email].name} aprobado`);}function revoke(email){const u=DB.users();u[email].status="rejected";DB.saveUsers(u);setUsers({...u});toast_("⊘ Acceso revocado");}
const all=Object.values(users).filter(u=>u.role!=="admin");const counts={pending:all.filter(u=>u.status==="pending").length,approved:all.filter(u=>u.status==="approved").length,rejected:all.filter(u=>u.status==="rejected").length};const list=filter==="all"?all:all.filter(u=>u.status===filter);const sColor={pending:"#FFCC02",approved:brand.accent,rejected:"#ff3d6e"};

<div style={{textAlign:"center",marginTop:20,fontSize:"0.65rem",color:"rgba(232,238,255,0.15)"}}>{brand.name} v{brand.version||APP_VERSION}</div></div></div>}
<div style={{position:"relative",zIndex:5,display:"flex",borderBottom:`1px solid ${G.glassBorder}`,background:"rgba(5,8,18,0.5)",flexShrink:0}}>{tabBtn("chat","💬 Chat",false)}{tabBtn("code","{ } Código",newBadge.code)}{tabBtn("expl","📖 Explicación",newBadge.expl)}</div>
{tab==="chat"&&<div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden",zIndex:1}}><div style={{flex:1,overflowY:"auto",padding:"18px 16px",display:"flex",flexDirection:"column",gap:14}}>{msgs.map((m,i)=><div key={i} style={{display:"flex",flexDirection:m.role==="user"?"row-reverse":"row",gap:10}}><div style={{width:32,height:32,borderRadius:11,flexShrink:0,background:m.role==="ai"?`${brand.accent}18`:`${brand.accent2}18`,border:`1px solid ${m.role==="ai"?brand.accent:brand.accent2}33`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:m.role==="ai"?brand.accent:brand.accent2,fontSize:"0.8rem"}}>{m.role==="ai"?"AI":user.name[0].toUpperCase()}</div><div style={{maxWidth:"80%",padding:"12px 16px",fontSize:"0.85rem",lineHeight:1.7,background:m.role==="ai"?G.glass:`${brand.accent}0e`,border:`1px solid ${m.role==="ai"?G.glassBorder:brand.accent+"28"}`,borderRadius:m.role==="ai"?"4px 18px 18px 18px":"18px 4px 18px 18px",whiteSpace:"pre-wrap",color:G.text}}>{m.text}</div></div>)}{loading&&<div style={{display:"flex",gap:10}}><div style={{width:32,height:32,borderRadius:11,background:`${brand.accent}18`,border:`1px solid ${brand.accent}33`,display:"flex",alignItems:"center",justifyContent:"center",color:brand.accent,fontSize:"0.8rem",flexShrink:0}}>AI</div><div style={{padding:"14px 18px",background:G.glass,border:`1px solid ${G.glassBorder}`,borderRadius:"4px 18px 18px 18px"}}><div style={{display:"flex",gap:5}}>{[0,1,2].map(i=><div key={i} style={{width:5,height:5,borderRadius:"50%",background:brand.accent,animation:`bounce 1.2s ease ${i*0.2}s infinite`}}/>)}</div></div></div>}<div ref={endRef}/></div><div style={{padding:"10px 16px",display:"flex",gap:8,overflowX:"auto",flexShrink:0}}>{QUICK_PROMPTS.map((q,i)=><button key={i} onClick={()=>send(q.prompt)} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",borderRadius:50,background:G.glass,border:`1px solid ${G.glassBorder}`,color:q.color,fontFamily:G.font,fontSize:"0.76rem",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}><span>{q.icon}</span>{q.label}</button>)}</div><div style={{padding:"12px 16px",borderTop:`1px solid ${G.glassBorder}`,display:"flex",gap:10,background:"rgba(5,8,18,0.7)",flexShrink:0}}><input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send(input)} placeholder="Describe el algoritmo en tus palabras..." style={{flex:1,padding:"13px 18px",background:G.glass,border:`1px solid ${G.glassBorder}`,borderRadius:16,fontFamily:G.font,fontSize:"0.85rem",color:G.text,outline:"none"}} onFocus={e=>e.target.style.borderColor=brand.accent+"66"} onBlur={e=>e.target.style.borderColor=G.glassBorder}/><button onClick={()=>send(input)} style={{width:46,height:46,borderRadius:14,background:`linear-gradient(135deg,${brand.accent},${brand.accent2})`,border:"none",cursor:"pointer",color:"white",fontSize:"1.1rem",flexShrink:0}}>→</button></div></div>}
{tab==="code"&&<div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden",zIndex:1}}><div style={{padding:"12px 16px",borderBottom:`1px solid ${G.glassBorder}`,display:"flex",gap:8,flexShrink:0}}><NeonButton small ghost color={brand.accent} onClick={()=>{navigator.clipboard.writeText(code);setCopied(true);setTimeout(()=>setCopied(false),2000);}}>{copied?"✓ Copiado":"⊕ Copiar"}</NeonButton>{code&&<NeonButton small ghost color={G.dim} onClick={()=>{setCode("");setExpl("");setNewBadge({code:false,expl:false});}}>↺ Limpiar</NeonButton>}</div><div style={{flex:1,overflowY:"auto",padding:"18px",background:"rgba(3,5,12,0.8)"}}>{code?<pre style={{fontFamily:G.mono,fontSize:"0.78rem",lineHeight:2,whiteSpace:"pre-wrap",wordBreak:"break-word",color:"#a8b8d8",margin:0}} dangerouslySetInnerHTML={{__html:hiCode(code)}}/>:<div style={{textAlign:"center",padding:"80px 20px",color:G.dim}}><div style={{fontSize:"3rem",marginBottom:16,opacity:0.15}}>{"{ }"}</div><div style={{fontSize:"0.85rem",lineHeight:2}}>El código aparecerá aquí<br/><span style={{color:brand.accent}}>←</span> Ve al Chat y pide un algoritmo</div></div>}</div></div>}
{tab==="expl"&&<div style={{flex:1,overflowY:"auto",padding:"20px 18px",zIndex:1}}>{expl?<GlassCard style={{padding:"18px 20px"}}><div style={{fontSize:"0.68rem",color:brand.accent,letterSpacing:"0.12em",fontWeight:700,marginBottom:8,textTransform:"uppercase"}}>Explicación</div><p style={{fontSize:"0.85rem",lineHeight:1.85,color:G.text,margin:0,whiteSpace:"pre-wrap"}}>{expl}</p></GlassCard>:<div style={{textAlign:"center",padding:"80px 20px",color:G.dim}}><div style={{fontSize:"3rem",marginBottom:16,opacity:0.15}}>📖</div><div style={{fontSize:"0.85rem",lineHeight:2}}>La explicación aparecerá aquí<br/><span style={{color:brand.accent}}>←</span> Ve al Chat y pide un algoritmo</div></div>}</div>}
</div>);}
function App(){const[user,setUser]=useState(()=>DB.session());if(!user)return <LoginScreen onAuth={setUser}/>;return <ChatApp user={user} onLogout={()=>setUser(null)}/>;}
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
  </script>
